<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="img/26475.jpg" type="image/png">

    <script src="/socket.io/socket.io.js"></script>

    <title>Camera Control</title>
</head>

<body>

    <div class="panel">

        <div class="header">

            <h1>Vista de D-I-0336-7</h1>

            <img src="img/Unilogo.png" alt="Logo de la universidad" id="logou">

        </div>

        <img src="img/2026-05-16_09-28.png" id="Camera">

        <div class="controls">

            <div class="movement">
                <button onpointerdown="usandoPantalla=true; enviarComando(1)" onpointerup="usandoPantalla=false; enviarComando(0)" id="fow">W</button>
                <button onpointerdown="usandoPantalla=true; enviarComando(4)" onpointerup="usandoPantalla=false; enviarComando(0)" id="left">D</button>
                <button onpointerdown="usandoPantalla=true; enviarComando(8)" onpointerup="usandoPantalla=false; enviarComando(0)" id="right">A</button>
                <button onpointerdown="usandoPantalla=true; enviarComando(2)" onpointerup="usandoPantalla=false; enviarComando(0)" id="bac">S</button>
            </div>

            <div class="Action">
                <button onpointerdown="enviarComando(11)" onpointerup="enviarComando(0)">Fire extinguisher</button>
            </div>

        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
